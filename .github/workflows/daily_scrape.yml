name: Daily Opportunity Fetcher

on:
  schedule:
    # This runs every day at 00:30 UTC (6:00 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper
        env:
          VITE_FIRECRAWL_API_KEY: ${{ secrets.VITE_FIRECRAWL_API_KEY }}
          # Pass the service account JSON string to the script
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/autoScraper.js
